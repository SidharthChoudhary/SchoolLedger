{% load static %}
<!-- Print-only letterhead — include this file in any template that needs a print letterhead -->
<div id="print-letterhead" style="display:none; width:100%; padding-bottom:14px; border-bottom:3px double #1b4f4a; margin-bottom:20px;">
  <div style="display:flex; align-items:center; justify-content:center; gap:16px; max-width:860px; margin:0 auto;">
    <!-- Logo -->
    <div style="flex-shrink:0;">
      <img src="{% static 'website/logo_leftnew.png' %}" alt="School Logo"
           style="width:72px; height:72px; object-fit:contain;">
    </div>
    <!-- School info -->
    <div style="text-align:center;">
      <div style="font-size:26px; font-weight:800; color:#1b4f4a; letter-spacing:0.5px; line-height:1.1;">
        Devki Public School, Tibariyan, Jaipur
      </div>
      <div style="font-size:12px; color:#555; margin-top:3px; font-style:italic; letter-spacing:0.3px;">
        A new horizon in school education
      </div>
      <div style="font-size:11px; color:#666; margin-top:4px;">
        Devki Education Society (R) &nbsp;|&nbsp; 35 Pradhan Jiki Dhani, Tibariyan, Hingonia Road, Jaipur (Rajasthan)
      </div>
      <div style="font-size:11px; color:#666; margin-top:1px;">
        9887005428 &nbsp;•&nbsp; 9610211173
      </div>
    </div>
    <!-- Right logo -->
    <div style="flex-shrink:0;">
      <img src="{% static 'website/logo_right.png' %}" alt="School Logo Right"
           style="width:72px; height:72px; object-fit:contain;"
           onerror="this.style.visibility='hidden'">
    </div>
  </div>
</div>

<style>
@media print {
  #print-letterhead { display: block !important; }
}
</style>
