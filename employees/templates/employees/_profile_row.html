<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f3f4f6; margin-bottom:2px;">
  <span style="font-size:13px; color:#6b7280; min-width:140px;">{{ label }}</span>
  <span style="font-size:13px; color:#111827; font-weight:500; text-align:right;">{% if prefix %}{{ prefix }}{% endif %}{{ value }}{% if suffix and value != "—" %}{{ suffix }}{% endif %}</span>
</div>
